<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Teste de Formulario</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="iusu">Usuário: </label>
            <input type="text" name="iusu" id="iusu" required minlength="5" size="10" placeholder="Nome do usuario" autocomplete="username">
        </p>

        <P>
            <label for="isen">Senha</label>
            <input type="password" name="isen" id="isen" required minlength="8" maxlength="20" size="8" placeholder="No minimo 8 letras" autocomplete="current-password">
        </P>
        
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
    
</body>
</html>
