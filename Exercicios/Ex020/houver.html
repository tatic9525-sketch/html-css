<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de houver</title>
    <style>
      
      body{
        
        font-family: Arial, Helvetica, sans-serif;
    }

    div > p {

    display: none;

    }

    div:hover > p{
        display: block;
        background-color:  red ;
        color: white;
        width: 300px;
    }

    div:hover{
        color: red;
    }
    
    </style>
</head>
<body>
    <h1>Exemplo de houver</h1>
    <p>Passe o mouse dentro o texto abaixo</p>
    <div>
        Passe o mouse aqui

        <p>TEXTO EXCONDIDO...</p>
    </div>
    <p>Fim do exemplo</p>
</body>
</html>
